<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<title>아이디어 폴더 · 고객관점</title>
<style>
  :root{
    --bg:#0D0D0D; --surface:#151515; --surface-2:#1c1c1c; --line:#2a2a2a;
    --ink:#f2f2f0; --ink-dim:#8a8a86; --ink-faint:#5a5a56;
    --lime:#C8FF00; --lime-dim:#98c400;
    --img:#7ab8ff; --link:#ff9d5c; --idea:#c88bff;
    --gold:#ffd24a;
    --radius:16px; --radius-sm:10px;
    --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;
    -webkit-font-smoothing:antialiased;padding-bottom:calc(78px + env(safe-area-inset-bottom))}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px}

  /* Header */
  header{position:sticky;top:0;z-index:40;background:rgba(13,13,13,.9);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);padding:calc(13px + env(safe-area-inset-top)) 0 12px}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--lime);box-shadow:0 0 12px var(--lime);align-self:center}
  .brand-icon{width:46px;height:46px;border-radius:13px;align-self:center;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;padding:8px;
    background:radial-gradient(circle at 50% 42%,rgba(200,255,0,.2),#101206 72%);
    border:1px solid rgba(200,255,0,.5);box-shadow:0 0 18px rgba(200,255,0,.38),inset 0 0 12px rgba(200,255,0,.12)}
  .brand-icon svg{width:100%;height:100%;filter:drop-shadow(0 0 4px rgba(200,255,0,.7))}
  .brand h1{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:0}
  .brand .sub{font-size:11px;color:var(--ink-faint);letter-spacing:.14em;font-weight:600;text-transform:uppercase}
  .count{margin-left:auto;font-size:12px;color:var(--ink-dim)}
  .count b{color:var(--lime);font-weight:700}
  .searchbar{margin-top:12px;display:flex;align-items:center;gap:9px;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 13px}
  .searchbar svg{flex:0 0 auto;opacity:.5}
  .searchbar input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:15px;font-family:inherit}
  .searchbar input::placeholder{color:var(--ink-faint)}
  .searchbar .clr{background:none;border:none;color:var(--ink-faint);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;display:none}

  /* Workspace title block */
  .ws-title{margin:20px 0 6px}
  .ws-title .wt-top{display:flex;align-items:center;gap:10px}
  .ws-title .wt-ic{font-size:24px}
  .ws-title h2{font-size:24px;font-weight:800;margin:0;letter-spacing:-.02em}
  .ws-title h2 em{color:var(--lime);font-style:normal}
  .ws-title .wt-desc{font-size:13px;color:var(--ink-dim);margin-top:7px;line-height:1.5}

  /* Sub-group section */
  main{padding:6px 0 30px}
  .subgrp{margin-bottom:26px}
  .sg-head{display:flex;align-items:center;gap:8px;margin:0 2px 12px}
  .sg-head .sg-name{font-size:14px;font-weight:800}
  .sg-head .sg-n{font-size:11px;font-weight:800;color:var(--lime);background:rgba(200,255,0,.1);
    border:1px solid rgba(200,255,0,.25);border-radius:11px;min-width:22px;height:20px;
    display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
  .sg-head .sg-line{flex:1;height:1px;background:var(--line)}

  /* Horizontal scroll rail for cards */
  .rail{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none;scroll-snap-type:x proximity}
  .rail::-webkit-scrollbar{display:none}
  .rail>*{scroll-snap-align:start}

  /* Card — instagram 4:5 */
  .card{flex:0 0 clamp(150px,42vw,190px);border-radius:var(--radius);overflow:hidden;
    background:var(--surface);border:1px solid var(--line);position:relative;cursor:pointer;
    transition:.15s;display:flex;flex-direction:column}
  .card:active{transform:scale(.985)}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.4)}
  @media(prefers-reduced-motion:reduce){.card:hover{transform:none}}
  .card.fav-on{border-color:rgba(255,210,74,.5);box-shadow:0 0 0 1px rgba(255,210,74,.25)}
  .card .media{position:relative;aspect-ratio:4/5;background:#0a0a0a;overflow:hidden}
  .card.t-img .media img{width:100%;height:100%;object-fit:contain;display:block}
  .card.t-idea .media,.card.t-link .media,.card.t-prompt .media{
    display:flex;flex-direction:column;padding:13px;gap:9px}
  .card .t-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;align-self:flex-start}
  .t-idea .t-badge{background:rgba(200,139,255,.16);color:var(--idea)}
  .t-link .t-badge{background:rgba(255,157,92,.16);color:var(--link)}
  .t-prompt .t-badge{background:rgba(200,255,0,.14);color:var(--lime)}
  .card .body-txt{font-size:13px;color:var(--ink);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:7;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .t-prompt .body-txt{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#d8ffb0}
  .t-link .link-title{font-size:13.5px;font-weight:700;color:var(--link);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .t-link .link-host{font-size:10.5px;color:var(--ink-faint);margin-top:auto;word-break:break-all}
  .card .cat-cap{position:absolute;left:0;right:0;bottom:0;padding:18px 10px 8px;z-index:2;
    background:linear-gradient(to top,rgba(0,0,0,.85),transparent);font-size:11px;color:#fff;font-weight:600;line-height:1.3}
  .card .card-linkdot{position:absolute;top:7px;left:38px;z-index:3;background:rgba(255,157,92,.9);
    width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px}
  .card .card-linkline{font-size:11px;color:var(--link);margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* fav star top-left */
  .card .fav{position:absolute;top:7px;left:8px;z-index:3;background:rgba(0,0,0,.45);border:none;
    width:26px;height:26px;border-radius:8px;cursor:pointer;font-size:14px;color:#fff;
    display:flex;align-items:center;justify-content:center;padding:0;backdrop-filter:blur(4px)}
  .card .fav.on{color:var(--gold)}
  /* delete top-right */
  .card .del{position:absolute;top:7px;right:8px;z-index:3;background:rgba(0,0,0,.45);border:none;
    width:26px;height:26px;border-radius:8px;cursor:pointer;font-size:13px;color:#fff;
    display:flex;align-items:center;justify-content:center;padding:0;backdrop-filter:blur(4px);opacity:0;transition:.15s}
  .card:hover .del{opacity:1}

  /* Execution footer */
  .exec{border-top:1px solid var(--line);padding:8px 10px;display:flex;align-items:center;gap:8px;background:var(--surface)}
  .exec .status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .exec .status.wait{color:var(--ink-dim);background:var(--surface-2)}
  .exec .status.done{color:var(--lime);background:rgba(200,255,0,.12)}
  .exec .tally{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;
    font-family:ui-monospace,monospace;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .exec .use-btn{background:var(--lime);color:#0D0D0D;border:none;border-radius:8px;
    padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;transition:.12s;flex:0 0 auto}
  .exec .use-btn:active{transform:scale(.93)}

  /* Add card (dashed) */
  .card.add{border:1.5px dashed #383834;background:var(--surface);cursor:pointer;
    align-items:center;justify-content:center}
  .card.add .media{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:none;width:100%}
  .card.add:hover{border-color:var(--lime)}
  .card.add .a-plus{font-size:28px;color:var(--ink-faint);font-weight:300;line-height:1}
  .card.add:hover .a-plus{color:var(--lime)}
  .card.add .a-t{font-size:12px;color:var(--ink-faint);font-weight:700}

  .empty-hint{color:var(--ink-faint);font-size:13px;text-align:center;padding:40px 0}

  /* Home hero slot */
  .home-hero{padding:26px 0 6px;text-align:center}
  .home-hero .hh-lead{font-size:14px;color:var(--ink-dim);margin-bottom:18px;line-height:1.55}
  .home-hero .hh-lead b{color:var(--lime);font-weight:700}
  .hero-slot{position:relative;width:100%;aspect-ratio:4/5;max-width:300px;margin:0 auto;
    border:2px dashed #3a3a36;border-radius:22px;cursor:pointer;transition:.18s;
    background:radial-gradient(130% 130% at 50% 0%,rgba(200,255,0,.08),transparent 62%),var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:26px;text-align:center}
  .hero-slot:active{transform:scale(.985)}
  .hero-slot:hover{border-color:var(--lime);
    background:radial-gradient(130% 130% at 50% 0%,rgba(200,255,0,.13),transparent 62%),var(--surface)}
  .hero-slot .plus{width:58px;height:58px;border-radius:50%;background:var(--lime);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(200,255,0,.34)}
  .hero-slot .plus svg{stroke:#0D0D0D}
  .hero-slot .ht{font-size:17px;font-weight:800}
  .hero-slot .hs{font-size:12.5px;color:var(--ink-dim);line-height:1.5;max-width:220px}
  .hero-quick{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap}
  .hero-quick button{background:var(--surface);border:1px solid var(--line);border-radius:20px;
    padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-dim);
    display:flex;align-items:center;gap:6px;transition:.15s}
  .hero-quick button:active{transform:scale(.96)}
  .hero-quick button[data-q=image]:hover{border-color:var(--img);color:var(--img)}
  .hero-quick button[data-q=idea]:hover{border-color:var(--idea);color:var(--idea)}
  .hero-quick button[data-q=prompt]:hover{border-color:var(--lime);color:var(--lime)}
  .hero-quick button[data-q=link]:hover{border-color:var(--link);color:var(--link)}

  /* Home inline composer */
  .composer{background:transparent;border:none;border-radius:0;;
    padding:16px;margin:20px 0 8px}
  .comp-lead{font-size:13.5px;color:var(--ink-dim);margin-bottom:14px;line-height:1.55;text-align:center}
  .home-first{text-align:center;color:var(--ink-faint);font-size:13px;line-height:1.6;padding:6px 20px}
  .comp-lead b{color:var(--lime);font-weight:700}
  /* type buttons */
  .comp-types{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .comp-types button{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;
    padding:11px 4px;cursor:pointer;color:var(--ink-dim);display:flex;flex-direction:column;
    align-items:center;gap:5px;font-size:11.5px;font-weight:700;transition:.15s}
  .comp-types button .ic{font-size:19px}
  .comp-types button.sel[data-t=image]{border-color:var(--img);color:var(--img);background:rgba(122,184,255,.08)}
  .comp-types button.sel[data-t=idea]{border-color:var(--idea);color:var(--idea);background:rgba(200,139,255,.08)}
  .comp-types button.sel[data-t=prompt]{border-color:var(--lime);color:var(--lime);background:rgba(200,255,0,.08)}
  .comp-types button.sel[data-t=link]{border-color:var(--link);color:var(--link);background:rgba(255,157,92,.08)}
  /* input zone */
  .comp-imgzone{position:relative;width:100%;max-width:300px;aspect-ratio:4/5;max-height:300px;
    margin:0 auto 14px;border-radius:15px;overflow:hidden;background:#0a0a0a;border:1.5px dashed #3a3a36;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .comp-imgzone.over{border-color:var(--img);background:rgba(122,184,255,.05)}
  .comp-imgzone.filled{border-style:solid;border-color:var(--line)}
  .comp-imgzone .cz-empty{text-align:center;color:var(--ink-faint);font-size:13px;padding:20px}
  .comp-imgzone .cz-empty b{color:var(--img)}.comp-imgzone .cz-ic{font-size:28px;margin-bottom:8px}
  .comp-imgzone img{width:100%;height:100%;object-fit:contain}
  .comp-imgzone .rm{position:absolute;top:9px;right:9px;background:rgba(0,0,0,.72);border:none;color:#fff;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;z-index:2}
  .comp-text{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;color:var(--ink);font-size:15px;font-family:inherit;outline:none;resize:vertical;min-height:96px;margin-bottom:14px}
  .comp-text:focus{border-color:var(--lime)}
  .comp-text.mono{font-family:ui-monospace,monospace;font-size:13px}
  .comp-url{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;color:var(--ink);font-size:15px;font-family:inherit;outline:none;margin-bottom:14px}
  .comp-url:focus{border-color:var(--lime)}
  /* dest chips (always visible, compact) */
  .comp-sub{margin-bottom:12px}
  .comp-sub .cs-label{font-size:12px;font-weight:700;color:var(--ink-dim);margin-bottom:8px}
  .comp-dest{display:flex;flex-wrap:wrap;gap:7px}
  .comp-dest .co{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-dim);
    border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .comp-dest .co.sel{background:var(--lime);color:#0D0D0D;border-color:var(--lime)}
  /* collapsible more options */
  .comp-more-toggle{width:100%;background:none;border:1px dashed var(--line);color:var(--ink-dim);
    border-radius:11px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;
    display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
  .comp-more-toggle:hover{border-color:var(--ink-dim);color:var(--ink)}
  .comp-more-toggle .chev{transition:.2s}
  .comp-more-toggle.open .chev{transform:rotate(180deg)}
  .comp-more{overflow:hidden;transition:max-height .25s ease;max-height:0}
  .comp-more.open{max-height:600px}
  .comp-more-inner{padding-top:2px}
  .comp-field{margin-bottom:14px}
  .comp-field label{display:block;font-size:12px;font-weight:700;color:var(--ink-dim);margin-bottom:8px}
  .comp-field label .opt{color:var(--ink-faint);font-weight:400}
  .comp-field input[type=text]{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 13px;color:var(--ink);font-size:15px;font-family:inherit;outline:none}
  .comp-field input:focus{border-color:var(--lime)}
  .comp-chips{display:flex;flex-wrap:wrap;gap:7px}
  .comp-chips .co{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .comp-chips .co.sel{background:var(--lime);color:#0D0D0D;border-color:var(--lime)}
  .comp-inline-add{display:flex;gap:7px;margin-top:8px}
  .comp-inline-add input{flex:1}
  .comp-inline-add button{background:var(--surface-2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:0 14px;font-weight:700;cursor:pointer;font-size:13px}
  .comp-save{width:100%;background:var(--lime);color:#0D0D0D;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;transition:.15s}
  .comp-save:active{transform:scale(.99)}.comp-save:disabled{opacity:.35;cursor:not-allowed}

  /* Big hero-style input slot on home */
  .comp-heroslot{position:relative;width:100%;max-width:360px;aspect-ratio:4/5;max-height:440px;
    margin:0 auto;border:2px dashed #3a3a36;border-radius:22px;cursor:pointer;transition:.18s;overflow:hidden;
    background:radial-gradient(130% 130% at 50% 0%,rgba(200,255,0,.08),transparent 62%),var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:26px;text-align:center}
  .comp-heroslot:hover{border-color:var(--lime);
    background:radial-gradient(130% 130% at 50% 0%,rgba(200,255,0,.13),transparent 62%),var(--surface)}
  .comp-heroslot.over{border-color:var(--img);background:rgba(122,184,255,.06)}
  .comp-heroslot.filled{border-style:solid;border-color:var(--line);background:#0a0a0a;padding:0;cursor:default}
  .comp-heroslot.filled img{width:100%;height:100%;object-fit:contain}
  .comp-heroslot .hplus{width:58px;height:58px;border-radius:50%;background:var(--lime);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(200,255,0,.34)}
  .comp-heroslot .hplus svg{stroke:#0D0D0D}
  .comp-heroslot .hp-t{font-size:17px;font-weight:800}
  .comp-heroslot .hp-s{font-size:12.5px;color:var(--ink-dim);line-height:1.5;max-width:220px}
  .comp-heroslot .hp-s b{color:var(--img)}
  .comp-heroslot .rm{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.72);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;z-index:2}
  /* text/link variant — same frame, but holds a textarea/input */
  .comp-heroslot.text{aspect-ratio:auto;max-height:none;min-height:210px;cursor:default;
    border-style:solid;border-color:var(--line);background:var(--surface);padding:18px;align-items:stretch;justify-content:flex-start}
  .comp-heroslot.text .comp-text,.comp-heroslot.text .comp-url{margin:0;border:none;background:transparent;padding:4px;min-height:170px}
  .comp-heroslot.text .comp-url{min-height:auto}

  /* Unified composer slot: photo + text + link together */
  /* Independent photo card slot */
  .photo-card{max-width:340px;margin:0 auto 14px;aspect-ratio:4/5;max-height:420px;
    border:1px solid rgba(200,255,0,.22);border-radius:22px;overflow:hidden;background:var(--bg);
    display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:.2s;
    animation:floaty 8s ease-in-out infinite, glowpulse 6s ease-in-out infinite}
  .photo-card:hover{border-color:rgba(200,255,0,.4)}
  .photo-card.over{border-color:rgba(122,184,255,.5);animation-play-state:paused}
  .photo-card.filled{cursor:default;background:#0a0a0a;border-color:var(--line);animation:none}
  .photo-card img{width:100%;height:100%;object-fit:contain}
  .photo-card .rm{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.72);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;z-index:2}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes glowpulse{0%,100%{box-shadow:0 0 20px rgba(200,255,0,.05)}50%{box-shadow:0 0 30px rgba(200,255,0,.11)}}
  @media(prefers-reduced-motion:reduce){.photo-card{animation:none}}
  .up-empty{text-align:center;padding:24px;display:flex;flex-direction:column;align-items:center;gap:11px}
  .up-plus{width:54px;height:54px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;
    box-shadow:0 5px 24px rgba(200,255,0,.42);animation:plusbob 3.4s ease-in-out infinite}
  .up-plus svg{stroke:#0D0D0D}
  @keyframes plusbob{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @media(prefers-reduced-motion:reduce){.up-plus{animation:none}}
  .up-t{font-size:15px;font-weight:800}
  .up-s{font-size:12px;color:var(--ink-dim);line-height:1.5}.up-s b{color:var(--img)}.up-s .up-opt{color:var(--ink-faint)}
  /* card entrance */
  @keyframes cardpop{0%{opacity:0;transform:translateY(8px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .card.pop{animation:cardpop .34s ease-out}
  /* Separate field boxes below photo */
  .field-box{max-width:340px;margin:0 auto 10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;transition:.15s}
  .field-box:focus-within{border-color:rgba(200,255,0,.35)}
  .fb-text{width:100%;background:transparent;border:none;outline:none;color:var(--ink);
    font-size:15px;font-family:inherit;padding:14px 15px;min-height:80px;resize:vertical;line-height:1.55}
  .fb-text::placeholder{color:var(--ink-faint)}
  .link-box{display:flex;align-items:center;gap:9px;padding:13px 15px}
  .link-box .lb-ic{font-size:15px;opacity:.6;flex:0 0 auto}
  .link-box input{flex:1;background:transparent;border:none;outline:none;color:var(--link);font-size:14px;font-family:inherit}
  .link-box input::placeholder{color:var(--ink-faint)}

  /* Bottom tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:45;background:rgba(18,18,18,.95);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line);
    display:flex;padding:7px 4px calc(7px + env(safe-area-inset-bottom));gap:2px}
  .tabbar button{flex:1;background:none;border:none;cursor:pointer;color:var(--ink-faint);
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:12px;transition:.15s;position:relative}
  .tabbar button .tb-ic{font-size:20px;line-height:1}
  .tabbar button .tb-l{font-size:10.5px;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
  .tabbar button .tb-n{position:absolute;top:0;right:calc(50% - 24px);background:var(--ink-faint);
    color:#0D0D0D;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;padding:0 4px}
  .tabbar button.on{color:var(--lime)}
  .tabbar button.on .tb-n{background:var(--lime)}
  .tabbar button.on::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    width:24px;height:3px;border-radius:2px;background:var(--lime)}

  /* Scrim + modal */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:50;opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(3px)}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-46%) scale(.96);z-index:55;
    width:calc(100% - 28px);max-width:620px;max-height:92vh;overflow-y:auto;background:var(--surface);
    border:1px solid var(--line);border-radius:24px;padding:28px 30px calc(28px + env(safe-area-inset-bottom));
    opacity:0;pointer-events:none;transition:.22s cubic-bezier(.32,.72,0,1)}
  .modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .modal h3{font-size:20px;font-weight:800;margin:0 0 4px}
  .modal .hint{font-size:13px;color:var(--ink-faint);margin-bottom:22px}
  .modal .x{position:absolute;top:22px;right:24px;background:var(--surface-2);border:none;color:var(--ink-dim);
    width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;line-height:1}

  .typepick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:22px}
  .typepick button{background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:15px 6px;
    cursor:pointer;color:var(--ink-dim);display:flex;flex-direction:column;align-items:center;gap:7px;font-size:12.5px;font-weight:700;transition:.15s}
  .typepick button .ic{font-size:22px}
  .typepick button.sel[data-t=image]{border-color:var(--img);color:var(--img);background:rgba(122,184,255,.08)}
  .typepick button.sel[data-t=idea]{border-color:var(--idea);color:var(--idea);background:rgba(200,139,255,.08)}
  .typepick button.sel[data-t=link]{border-color:var(--link);color:var(--link);background:rgba(255,157,92,.08)}
  .typepick button.sel[data-t=prompt]{border-color:var(--lime);color:var(--lime);background:rgba(200,255,0,.08)}

  .field{margin-bottom:18px}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--ink-dim);margin-bottom:9px}
  .field label .opt{color:var(--ink-faint);font-weight:400}
  .field textarea,.field input[type=text],.field input[type=url]{width:100%;background:var(--bg);
    border:1px solid var(--line);border-radius:11px;padding:13px 14px;color:var(--ink);font-size:15px;font-family:inherit;outline:none;resize:vertical}
  .field textarea:focus,.field input:focus{border-color:var(--lime)}
  .field textarea{min-height:110px}
  .field textarea.mono{font-family:ui-monospace,monospace;font-size:13px}

  .imgzone{position:relative;width:100%;max-width:340px;aspect-ratio:4/5;max-height:340px;border-radius:16px;overflow:hidden;
    background:#0a0a0a;border:1.5px dashed #3a3a36;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .imgzone.over{border-color:var(--img);background:rgba(122,184,255,.05)}
  .imgzone.filled{border-style:solid;border-color:var(--line)}
  .imgzone .iz-empty{text-align:center;color:var(--ink-faint);font-size:13px;padding:20px}
  .imgzone .iz-empty b{color:var(--img)}.imgzone .iz-ic{font-size:28px;margin-bottom:8px}
  .imgzone img{width:100%;height:100%;object-fit:contain}
  .imgzone .rm{position:absolute;top:9px;right:9px;background:rgba(0,0,0,.72);border:none;color:#fff;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;z-index:2}

  .chiprow{display:flex;flex-wrap:wrap;gap:8px}
  .chiprow .co{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-dim);border-radius:9px;
    padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
  .chiprow .co.sel{background:var(--lime);color:#0D0D0D;border-color:var(--lime)}
  .addinline{display:flex;gap:8px;margin-top:9px}
  .addinline input{flex:1}
  .addinline button{background:var(--surface-2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:0 17px;font-weight:700;cursor:pointer;font-size:14px}

  .save-btn{width:100%;background:var(--lime);color:#0D0D0D;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;transition:.15s}
  .save-btn:active{transform:scale(.99)}.save-btn:disabled{opacity:.35;cursor:not-allowed}

  /* Detail sheet */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:55;background:var(--surface);border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;padding:8px 18px calc(24px + env(safe-area-inset-bottom));max-width:820px;margin:0 auto;
    transform:translateY(100%);transition:.26s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow-y:auto}
  .sheet.show{transform:translateY(0)}
  .grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:6px auto 16px}
  .detail-img{width:100%;max-height:56vh;object-fit:contain;border-radius:12px;margin-bottom:14px;border:1px solid var(--line);background:#0a0a0a;display:block}
  .d-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .d-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
  .d-when{font-size:11px;color:var(--ink-faint);margin-left:auto}
  .d-body{font-size:16px;white-space:pre-wrap;margin-bottom:14px;word-break:break-word}
  .d-body.mono{font-family:ui-monospace,monospace;font-size:14px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px;color:#d8ffb0}
  .d-linkbox{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:14px;text-decoration:none;color:inherit}
  .d-linkbox .fav2{width:28px;height:28px;border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:15px}
  .d-linkbox .lk-t{font-size:14px;font-weight:600;color:var(--link);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .d-linkbox .lk-u{font-size:11px;color:var(--ink-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .d-memo{font-size:13px;color:var(--ink-dim);padding-left:9px;border-left:2px solid var(--line);white-space:pre-wrap;margin-bottom:14px}
  .d-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .d-meta span{font-size:11px;color:var(--ink-dim);background:var(--surface-2);padding:3px 8px;border-radius:6px;font-weight:600}
  .d-meta .cat{color:var(--lime);background:rgba(200,255,0,.08)}
  .d-exec{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:16px}
  .d-exec .de-label{font-size:12px;color:var(--ink-dim);font-weight:700}
  .d-exec .de-tally{font-size:16px;color:var(--gold);font-weight:800;letter-spacing:2px;font-family:ui-monospace,monospace;flex:1;word-break:break-all}
  .d-exec .de-count{font-size:12px;color:var(--ink-faint)}
  .d-exec button{background:var(--lime);color:#0D0D0D;border:none;border-radius:9px;padding:8px 15px;font-size:13px;font-weight:800;cursor:pointer}
  .d-exec .de-reset{background:var(--surface-2);color:var(--ink-dim);font-weight:600;padding:8px 11px}
  .d-actions{display:flex;gap:9px}
  .d-actions button{flex:1;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:800;cursor:pointer}
  .d-fav{background:var(--surface-2);color:var(--gold)}
  .d-del{background:var(--surface-2);color:var(--link)}

  .toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--lime);color:#0D0D0D;padding:11px 20px;border-radius:22px;font-weight:700;font-size:14px;z-index:80;
    opacity:0;pointer-events:none;transition:.25s;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand">
      <div class="brand-icon" id="brandIcon" aria-label="아이디어 폴더"></div><h1>아이디어 폴더</h1><span class="sub">고객관점</span>
      <span class="count"><b id="cTotal">0</b>개 보관</span>
    </div>
    <div class="searchbar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="search" placeholder="전체에서 검색 · 아이디어 · 태그 · 프롬프트">
      <button class="clr" id="clrSearch">×</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="ws-title" id="wsTitle"></div>
  <main id="feed"></main>
</div>

<nav class="tabbar" id="tabbar"></nav>

<!-- Add modal -->
<div class="scrim" id="scrim"></div>
<div class="modal" id="modal">
  <button class="x" id="closeModal">×</button>
  <h3>빠르게 담기</h3>
  <div class="hint" id="modalHint"></div>

  <div class="typepick" id="typePick">
    <button data-t="image" class="sel"><span class="ic">🖼️</span>이미지</button>
    <button data-t="idea"><span class="ic">💡</span>아이디어</button>
    <button data-t="prompt"><span class="ic">⌘</span>프롬프트</button>
    <button data-t="link"><span class="ic">🔗</span>링크</button>
  </div>

  <div class="field" data-for="image">
    <div class="imgzone" id="imgzone">
      <div class="iz-empty" id="izEmpty"><div class="iz-ic">🖼️</div><b>붙여넣기(Ctrl+V)</b> 하거나<br>탭해서 사진 선택</div>
      <input type="file" id="fFile" accept="image/*" hidden>
    </div>
  </div>

  <div class="field" data-for="link" style="display:none">
    <label>툴 · 레퍼런스 링크</label>
    <input type="url" id="fUrl" placeholder="https://…">
  </div>

  <div class="field" data-for="idea prompt" style="display:none">
    <label id="textLabel">떠오른 생각</label>
    <textarea id="fText"></textarea>
  </div>

  <div class="field" id="destField" style="display:none">
    <label>어느 유형으로 보낼까요?</label>
    <div class="chiprow" id="destRow"></div>
  </div>

  <div class="field">
    <label>소분류 <span class="opt" id="curWsName"></span></label>
    <div class="chiprow" id="groupRow"></div>
    <div class="addinline">
      <input type="text" id="newGroup" placeholder="새 소분류 추가 (예: 문제해결, 꿀팁)">
      <button id="addGroupBtn">추가</button>
    </div>
  </div>

  <div class="field">
    <label id="memoLabel">메모 <span class="opt">(선택)</span></label>
    <input type="text" id="fMemo" placeholder="예: 이 구도 릴스 인트로에 쓰기">
  </div>

  <div class="field">
    <label>태그 <span class="opt">(여러 개)</span></label>
    <div class="chiprow" id="tagSel"></div>
    <div class="addinline">
      <input type="text" id="newTag" placeholder="새 태그">
      <button id="addTagBtn">추가</button>
    </div>
  </div>

  <button class="save-btn" id="saveBtn">담기</button>
</div>

<!-- Detail sheet -->
<div class="scrim" id="dScrim"></div>
<div class="sheet" id="dSheet"><div class="grip"></div><div id="dContent"></div></div>

<div class="toast" id="toast"></div>

];
const DEFAULT_TAGS=['급함','꼭쓸것','구도','후킹','편집','스크립트'];
const TYPES={
  image:{label:'이미지',badge:'🖼️ 이미지',color:'var(--img)',cls:'t-img'},
  idea:{label:'아이디어',badge:'💡 아이디어',color:'var(--idea)',cls:'t-idea'},

let store=load();
let activeWs='home';
let curType='image',curGroup='',curTags=[],curImg=null,curWs='benchmark';
let search='';
const DEST_WS=WS.filter(w=>w.key!=='home'); // destinations for classification
let presetGroup='';

function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.items)return s}catch{}
  return{items:[],tags:[...DEFAULT_TAGS],groups:{}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(store))}catch(e){toast('저장공간 부족 — 사진을 좀 지워주세요')}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function host(u){try{return new URL(u).hostname.replace('www.','')}catch{return u}}
function esc(s){return(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}
function ago(ts){const t=new Date(ts);return(t.getMonth()+1)+'.'+t.getDate()}
function tally(n){ // 正 tally marks
  if(!n)return'';const full=Math.floor(n/5),rem=n%5;
  const marks=['','一','二','三','四'];
  return('正'.repeat(full)+(rem?marks[rem]:'')).trim()||'';}
function groupsFor(wsKey){const w=WS.find(x=>x.key===wsKey);
  const custom=store.groups[wsKey]||[];
  return[...new Set([...(w?w.groups:[]),...custom])];}

/* ── Bottom tabs ── */
function renderTabs(){
  const counts={};WS.forEach(w=>counts[w.key]=0);
  store.items.forEach(i=>{if(counts[i.ws]!==undefined)counts[i.ws]++});
  counts.home=store.items.length;
  const bar=document.getElementById('tabbar');
  bar.innerHTML=WS.map(w=>`<button data-ws="${w.key}" class="${activeWs===w.key?'on':''}">
    ${counts[w.key]?`<span class="tb-n">${counts[w.key]}</span>`:''}
    <span class="tb-ic">${w.ic}</span><span class="tb-l">${w.title}</span></button>`).join('');
  bar.querySelectorAll('button').forEach(b=>b.onclick=()=>{activeWs=b.dataset.ws;
    search='';document.getElementById('search').value='';document.getElementById('clrSearch').style.display='none';
    render();window.scrollTo({top:0,behavior:'smooth'})});
}

/* ── Card ── */
function cardHtml(i){
  const T=TYPES[i.type]||TYPES.idea;
  const favCls=i.fav?'fav-on':'';
  let media='';
  if(i.img){
    // photo card — text/link shown as caption strip
    const capText=i.text||(i.url?(i.title||host(i.url)):'');
    const cap=capText?`<div class="cat-cap">${esc(capText)}</div>`:'';
    const linkBadge=i.url?`<span class="card-linkdot" title="링크 포함">🔗</span>`:'';
    media=`<div class="media"><img src="${i.img}" loading="lazy">${linkBadge}${cap}</div>`;
  }else if(i.url&&!i.text){
    media=`<div class="media"><span class="t-badge">🔗 링크</span>
      <div class="link-title">${esc(i.title||host(i.url))}</div>
      <div class="link-host">${esc(host(i.url))}</div></div>`;
  }else{
    const link=i.url?`<div class="card-linkline">🔗 ${esc(i.title||host(i.url))}</div>`:'';
    media=`<div class="media"><span class="t-badge">💡 아이디어</span>
      <div class="body-txt">${esc(i.text||'')}</div>${link}</div>`;
  }
  const used=i.uses||0;
  const status=used>0?`<span class="status done">사용 ${used}회</span>`:`<span class="status wait">대기중</span>`;
  const tm=tally(used)?`<span class="tally">${tally(used)}</span>`:`<span class="tally" style="color:var(--ink-faint)">—</span>`;
  return`<div class="card ${T.cls} ${favCls}" data-id="${i.id}">
    <button class="fav ${i.fav?'on':''}" data-fav="${i.id}">${i.fav?'★':'☆'}</button>
    <button class="del" data-del="${i.id}">✕</button>
    ${media}
    <div class="exec">
      ${status}${tm}
      <button class="use-btn" data-use="${i.id}">사용</button>
    </div>
  </div>`;
}
function addCard(wsKey,group){
  return`<div class="card add" data-add="${wsKey}" data-group="${esc(group||'')}">
    <div class="media"><span class="a-plus">+</span><span class="a-t">담기</span></div></div>`;
}

/* ── Render ── */

  document.getElementById('cTotal').textContent=store.items.length;

  const feed=document.getElementById('feed');
  const titleEl=document.getElementById('wsTitle');

  if(search){
    titleEl.innerHTML=`<div class="wt-top"><span class="wt-ic">🔍</span><h2>검색 <em>결과</em></h2></div>
      <div class="wt-desc">"${esc(search)}" — 전체에서 찾은 항목</div>`;
    const hits=store.items.filter(matchSearch).sort(sortFn);

    feed.innerHTML=`
      <div class="composer">

            <div class="up-t">사진 담기</div>

        </div>

        <div class="field-box">
          <textarea class="fb-text" id="uniText" placeholder="떠오른 생각 · 프롬프트 · 메모… 자유롭게"></textarea>
        </div>

        <div class="field-box link-box">
          <span class="lb-ic">🔗</span>
          <input type="url" id="uniUrl" placeholder="링크 붙여넣기 (선택)">
        </div>

        <div class="comp-sub" style="margin-top:16px">
          <div class="cs-label">유형 <span style="color:var(--ink-faint);font-weight:400">· 나중에 바꿔도 돼요</span></div>
          <div class="comp-dest" id="cDest"></div>

          <span>소분류 · 태그 추가</span><span class="chev">▾</span>
        </button>
        <div class="comp-more" id="cMore"><div class="comp-more-inner">
          <div class="comp-field">
            <label>소분류 <span class="opt" id="cGroupWs"></span></label>
            <div class="comp-chips" id="cGroupRow"></div>
            <div class="comp-inline-add">
              <input type="text" id="cNewGroup" placeholder="새 소분류 (예: 문제해결)">
              <button id="cAddGroup">추가</button>
            </div>
          </div>
          <div class="comp-field">
            <label>태그 <span class="opt">(여러 개)</span></label>
            <div class="comp-chips" id="cTagRow"></div>
            <div class="comp-inline-add">
              <input type="text" id="cNewTag" placeholder="새 태그">
              <button id="cAddTag">추가</button>
            </div>
          </div>

        <button class="comp-save" id="cSave" disabled>담기</button>
      </div>

      ${recent.length?`<div class="subgrp" style="margin-top:24px">
        <div class="sg-head"><span class="sg-name">최근 담은 것</span><span class="sg-n">${recent.length}</span><span class="sg-line"></span></div>
        <div class="rail">${recent.map(cardHtml).join('')}</div></div>`
      :`<div class="home-first" style="margin-top:22px">첫 아이디어를 담아보세요. 사진 한 장, 한 줄 메모, 링크 하나 — 뭐든 괜찮아요.</div>`}`;
    initComposer();

  }

  titleEl.innerHTML=`<div class="wt-top"><span class="wt-ic">${w.ic}</span>
    <h2>잘 된 <em>${w.accent}</em> 몰아보기</h2></div><div class="wt-desc">${esc(w.desc)}</div>`;

  const items=store.items.filter(i=>i.ws===w.key);
  const groups=groupsFor(w.key);
  let html='';
  groups.forEach(g=>{
    let gi=items.filter(i=>(i.group||'유형 미지정')===g).sort(sortFn);
    // skip empty non-default subgroups except show add in "유형 미지정"
    if(!gi.length && g!=='유형 미지정')return;
    html+=`<div class="subgrp">
      <div class="sg-head"><span class="sg-name">${esc(g)}</span><span class="sg-n">${gi.length}</span><span class="sg-line"></span></div>

function sortFn(a,b){if(!!b.fav!==!!a.fav)return(b.fav?1:0)-(a.fav?1:0);return b.ts-a.ts}
function matchSearch(i){const s=search.toLowerCase();
  const hay=[(i.text||''),(i.memo||''),(i.url||''),(i.group||''),...(i.tags||[])].join(' ').toLowerCase();
  return hay.includes(s)}

function bindFeed(){
  const feed=document.getElementById('feed');
  feed.querySelectorAll('[data-add]').forEach(el=>el.onclick=()=>{
    presetGroup=el.dataset.group||'';openModal(el.dataset.add,null,false)});
  feed.querySelectorAll('[data-fav]').forEach(b=>b.onclick=e=>{e.stopPropagation();
    const it=store.items.find(x=>x.id===b.dataset.fav);it.fav=!it.fav;save();render();
    toast(it.fav?'맨 위로 고정 ★':'고정 해제')});
  feed.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();
    if(confirm('삭제할까요?')){store.items=store.items.filter(x=>x.id!==b.dataset.del);save();render()}});
  feed.querySelectorAll('[data-use]').forEach(b=>b.onclick=e=>{e.stopPropagation();
    const it=store.items.find(x=>x.id===b.dataset.use);it.uses=(it.uses||0)+1;save();render();
    toast('사용 +1  ·  누적 '+it.uses+'회')});
  feed.querySelectorAll('.card:not(.add)').forEach(c=>c.onclick=()=>openDetail(c.dataset.id));
  if(lastAddedId){const el=feed.querySelector(`.card[data-id="${lastAddedId}"]`);
    if(el){el.classList.add('pop');el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true})}
    lastAddedId=null;}
}

/* ── Detail ── */
function openDetail(id){
  const i=store.items.find(x=>x.id===id);if(!i)return;const T=TYPES[i.type]||TYPES.idea;
  let media='';
  if(i.img)media+=`<img class="detail-img" src="${i.img}">`;
  if(i.text)media+=`<div class="d-body">${esc(i.text)}</div>`;
  if(i.url)media+=`<a class="d-linkbox" href="${esc(i.url)}" target="_blank" rel="noopener">
    <span class="fav2">🔗</span><span style="overflow:hidden"><span class="lk-t">${esc(i.title||host(i.url))}</span><br>
    <span class="lk-u">${esc(i.url)}</span></span></a>`;
  const meta=[`<span class="cat">${esc(i.group||'유형 미지정')}</span>`,...(i.tags||[]).map(t=>`<span>#${esc(t)}</span>`)].join('');
  const used=i.uses||0;
  document.getElementById('dContent').innerHTML=`
    <div class="d-head"><span class="d-badge" style="background:${T.color}22;color:${T.color}">${T.badge}</span>
      <span class="d-when">${new Date(i.ts).toLocaleDateString('ko-KR')}</span></div>
    ${media}
    ${i.memo?`<div class="d-memo">${esc(i.memo)}</div>`:''}
    ${meta?`<div class="d-meta">${meta}</div>`:''}
    <div class="d-exec">
      <div><div class="de-label">실행 카운트</div><div class="de-count">${used?used+'회 사용':'아직 대기중'}</div></div>
      <div class="de-tally">${tally(used)||'—'}</div>
      <button id="dUse">사용 +1</button>
      ${used?`<button class="de-reset" id="dReset">0</button>`:''}
    </div>
    <div class="d-actions">
      <button class="d-fav" id="dFav">${i.fav?'★ 고정됨':'☆ 맨위 고정'}</button>
      <button class="d-del" id="dDel">삭제</button>
    </div>`;
  document.getElementById('dUse').onclick=()=>{i.uses=(i.uses||0)+1;save();render();openDetail(id)};
  const rst=document.getElementById('dReset');if(rst)rst.onclick=()=>{i.uses=0;save();render();openDetail(id)};
  document.getElementById('dFav').onclick=()=>{i.fav=!i.fav;save();render();openDetail(id)};
  document.getElementById('dDel').onclick=()=>{if(confirm('삭제할까요?')){
    store.items=store.items.filter(x=>x.id!==id);save();render();closeDetail()}};
  document.getElementById('dScrim').classList.add('show');
  document.getElementById('dSheet').classList.add('show');
}
function closeDetail(){document.getElementById('dScrim').classList.remove('show');document.getElementById('dSheet').classList.remove('show')}
document.getElementById('dScrim').onclick=closeDetail;

/* ── Home inline composer (unified) ── */
let lastWs='benchmark';
let cWs='benchmark',cGroup='',cTags=[],cImg=null;

function compDest(){
  document.getElementById('cDest').innerHTML=DEST_WS.map(w=>
    `<button class="co ${cWs===w.key?'sel':''}" data-d="${w.key}">${w.ic} ${w.title}</button>`).join('');

function bindPhoto(){
  const p=document.getElementById('uniPhoto'),f=document.getElementById('uniFile');
  p.onclick=()=>{if(!cImg)f.click()};
  f.onchange=e=>{if(e.target.files[0])compLoadImg(e.target.files[0])};
  p.ondragover=e=>{e.preventDefault();p.classList.add('over')};
  p.ondragleave=()=>p.classList.remove('over');
  p.ondrop=e=>{e.preventDefault();p.classList.remove('over');const fl=[...e.dataTransfer.files].find(x=>x.type.startsWith('image/'));if(fl)compLoadImg(fl)};

function renderPhoto(){
  const p=document.getElementById('uniPhoto');if(!p)return;

      bindPhoto();compValidate()};
  }
}
function compLoadImg(file){compressImage(file,data=>{cImg=data;renderPhoto();compValidate()})}
document.addEventListener('paste',e=>{
  if(activeWs!=='home')return;
  const ae=document.activeElement;
  if(ae&&(ae.id==='uniText'||ae.id==='uniUrl'||ae.id==='cNewTag'||ae.id==='cNewGroup')){
    // if pasting an image while focused on text, still capture it
  }
  const it=[...e.clipboardData.items].find(x=>x.type&&x.type.startsWith('image/'));
  if(it){e.preventDefault();compLoadImg(it.getAsFile())}

function compGroups(){

const imgzone=document.getElementById('imgzone'),fileInput=document.getElementById('fFile'),izEmpty=document.getElementById('izEmpty');
imgzone.onclick=()=>{if(!curImg)fileInput.click()};
fileInput.onchange=e=>{if(e.target.files[0])loadImg(e.target.files[0])};
imgzone.ondragover=e=>{e.preventDefault();imgzone.classList.add('over')};

  const it=[...e.clipboardData.items].find(x=>x.type.startsWith('image/'));if(it)loadImg(it.getAsFile())});
function compressImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{
  const MAX=1280;let w=img.width,h=img.height;
  if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX}else if(h>=w&&h>MAX){w=Math.round(w*MAX/h);h=MAX}
  const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
  cb(c.toDataURL('image/jpeg',0.82))};img.src=r.result};r.readAsDataURL(file)}
function loadImg(file){compressImage(file,data=>{curImg=data;imgzone.classList.add('filled');
  imgzone.innerHTML=`<img src="${data}"><button class="rm" id="rmImg">삭제</button>`;
  document.getElementById('rmImg').onclick=e=>{e.stopPropagation();clearImg()};updateSave()})}

/* ── Save ── */
const fUrl=document.getElementById('fUrl'),fText=document.getElementById('fText');
fUrl.oninput=updateSave;fText.oninput=updateSave;
function updateSave(){let ok=false;
  if(curType==='image')ok=!!curImg;
  if(curType==='link')ok=fUrl.value.trim().length>0;
  if(curType==='idea'||curType==='prompt')ok=fText.value.trim().length>0;

function resetForm(){curType='image';curGroup='';curTags=[];curImg=null;
  fUrl.value='';fText.value='';document.getElementById('fMemo').value='';clearImg();

  applyType()}
document.getElementById('saveBtn').onclick=()=>{
  const item={id:uid(),type:curType,ws:curWs,group:curGroup||'유형 미지정',ts:Date.now(),
    fav:false,uses:0,tags:[...curTags],memo:document.getElementById('fMemo').value.trim()};
  if(curType==='image')item.img=curImg;
  else if(curType==='link'){let u=fUrl.value.trim();if(!/^https?:\/\//.test(u))u='https://'+u;item.url=u;item.title=host(u)}
  else{item.text=fText.value.trim()}
  store.items.unshift(item);save();closeModal();
  activeWs=curWs;search='';document.getElementById('search').value='';document.getElementById('clrSearch').style.display='none';
  render();toast('담았어요 ✓')};

let toastT;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700)}

render();
</script>

<script>
/* ══════════ 아이디어 폴더 — Supabase 연동 (idea_folder_ 전용) ══════════
   · 다른 앱과 완전 분리: idea_folder_items / idea_folder_users / idea-folder-photos 만 사용
     (컨텐츠 허브 li_*, 마스터즈 cm_* 는 절대 건드리지 않음)
   · URL/key 없거나 오프라인이면 기존 localStorage 그대로 (폴백)
   · UI/디자인/모션은 위 스크립트 그대로 — 여기선 저장소만 클라우드로 교체 */
(function(){
  const SUPABASE_URL  = 'https://goaqxjecotkwxrbzbdzc.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_Naq2_XethYcwMKG3pR4KUg_9KIxuHNM';
  const BUCKET  = 'idea-folder-photos';
  const SESS    = 'idea_folder_session';

  const sb = (window.supabase && SUPABASE_URL && SUPABASE_ANON)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

  if(!sb){ return; }   // 클라우드 못 쓰면 기존 로컬 앱 그대로 동작

  let CURRENT = null;                 // 로그인된 user_code
  let INTRO_VARIANT = 'a';            // 오프닝 인트로 시안 (a 웅장 / b 네온부팅 / c 빛폭발)
  const shadow = new Map();           // id -> 마지막 동기화 스냅샷(변경 감지용)
  const _localSave = save;            // 원래 localStorage 저장 함수

  /* ---- 유틸 ---- */
  async function sha256(s){
    const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  function pubUrl(path){ return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl; }
  function dataURLtoBlob(d){
    const [h,b]=d.split(','); const mime=(h.match(/:(.*?);/)||[])[1]||'image/jpeg';
    const bin=atob(b), u=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
    return new Blob([u],{type:mime});
  }
  function rowToItem(r){
    const it={ id:r.id, ws:r.ws, group:r.grp||'유형 미지정',
      ts:r.created_at?Date.parse(r.created_at):Date.now(),
      fav:!!r.fav, uses:r.uses||0, tags:Array.isArray(r.tags)?r.tags:[],
      type:r.type||'idea' };
    if(r.text) it.text=r.text;
    if(r.url){ it.url=r.url; it.title=r.title||host(r.url); }
    if(r.memo) it.memo=r.memo;
    if(r.img_path){ it._imgPath=r.img_path; it.img=pubUrl(r.img_path); }
    return it;
  }
  function itemToRow(it){
    return { id:it.id, user_code:CURRENT, ws:it.ws, grp:it.group||'유형 미지정',
      type:it.type||'idea', text:it.text||null, url:it.url||null, title:it.title||null,
      img_path:it._imgPath||null, memo:it.memo||null,
      tags:Array.isArray(it.tags)?it.tags:[], fav:!!it.fav, uses:it.uses||0 };
  }

  /* ---- 새 항목 id는 uuid로(=DB PK 호환) ---- */
  uid = ()=> (crypto.randomUUID ? crypto.randomUUID()
             : Date.now().toString(36)+Math.random().toString(36).slice(2,10));

  /* ---- save() 가로채기: 로컬 저장 + 클라우드 동기화 ---- */
  save = function(){ try{ _localSave(); }catch(e){} scheduleSync(); };

  let tmr=null, busy=false;
  function scheduleSync(){ if(!CURRENT) return; clearTimeout(tmr); tmr=setTimeout(runSync,450); }
  async function runSync(){
    if(!CURRENT || busy){ if(busy) scheduleSync(); return; }
    busy=true;
    try{
      // 1) 새 사진 업로드 (base64 → 버킷 → 공개 URL, localStorage 부담 제거)
      for(const it of store.items){
        if(it.img && it.img.indexOf('data:')===0 && !it._up){
          it._up=true;
          const path = CURRENT+'/'+it.id+'.jpg';
          const {error} = await sb.storage.from(BUCKET).upload(path, dataURLtoBlob(it.img),
            {contentType:'image/jpeg', upsert:true});
          if(!error){ it._imgPath=path; it.img=pubUrl(path); }
          delete it._up;
        }
      }
      try{ _localSave(); }catch(e){}
      // 2) 변경/추가 → upsert
      const rows=[], ids=new Set();
      for(const it of store.items){
        ids.add(it.id);
        const snap=JSON.stringify(itemToRow(it));
        if(shadow.get(it.id)!==snap) rows.push(itemToRow(it));
      }
      if(rows.length) await sb.from('idea_folder_items').upsert(rows);
      // 3) 삭제 반영
      const del=[...shadow.keys()].filter(id=>!ids.has(id));
      if(del.length) await sb.from('idea_folder_items').delete().in('id',del);
      // 4) shadow 갱신
      shadow.clear();
      for(const it of store.items) shadow.set(it.id, JSON.stringify(itemToRow(it)));
    }catch(e){ /* 네트워크 오류 시 다음 저장 때 자동 재시도 */ }
    finally{ busy=false; }
  }

  /* ---- 클라우드에서 내 항목 불러오기 ---- */
  async function loadCloud(code){
    const {data,error} = await sb.from('idea_folder_items').select('*')
      .eq('user_code',code).order('created_at',{ascending:false});
    if(error) throw error;
    const cloud = (data||[]).map(rowToItem);
    // 클라우드는 비었는데 이 기기에 로컬 데이터가 있으면 → 이사 제안
    if(cloud.length===0 && store.items.length>0){
      if(confirm('이 기기에 저장돼 있던 '+store.items.length+'개를 클라우드로 올릴까요?\n(취소하면 새로 시작합니다)')){
        store.items.forEach(it=>{ if(!/^[0-9a-f-]{36}$/i.test(it.id)) it.id=uid(); it._imgPath=undefined; });
        render(); save(); return;   // save() 가 사진 업로드 + 동기화 수행
      }
    }
    store.items = cloud;
    shadow.clear();
    for(const it of store.items) shadow.set(it.id, JSON.stringify(itemToRow(it)));
    try{ _localSave(); }catch(e){}
    render();
  }

  /* ---- 로그인 검증 ---- */
  async function tryLogin(code, pin){
    code=(code||'').trim().toUpperCase(); pin=(pin||'').trim();
    if(!code || !pin) return {ok:false, msg:'코드와 PIN을 입력하세요'};
    let row;
    try{
      const {data,error}=await sb.from('idea_folder_users').select('*').eq('code',code).maybeSingle();
      if(error) throw error; row=data;
    }catch(e){ return {ok:false, msg:'연결 오류 — 잠시 후 다시'}; }
    if(!row) return {ok:false, msg:'없는 코드예요'};
    let h=''; try{ h=await sha256(pin); }catch(e){}
    if(pin!==row.pin && h!==row.pin) return {ok:false, msg:'PIN이 달라요'};
    if(row.expires_at && Date.parse(row.expires_at) < Date.now())
      return {ok:false, msg:'만료된 코드예요 — 관리자에게 문의하세요'};
    CURRENT=code; localStorage.setItem(SESS,code);
    return {ok:true, expiresAt:row.expires_at||null};
  }

  /* ---- 로그인 화면 ---- */
  function pop(el){ el.classList.remove('kp'); void el.offsetWidth; el.classList.add('kp'); }
  function buzz(){ try{ navigator.vibrate && navigator.vibrate(12); }catch(e){} }

  /* 오프닝 인트로 (앱 켜질 때 웅장하게 등장 → 로그인) */
  function playIntro(variant, done){
    const iv=document.createElement('div'); iv.id='idfIntro'; iv.className='iv-'+variant;
    iv.innerHTML=`<div class="iv-stage">
      <div class="iv-ring"></div><div class="iv-ring iv-ring2"></div>
      <div class="iv-logo">${LOGO_SVG}</div>
      <div class="iv-title">아이디어 폴더</div>
    </div>`;
    document.body.appendChild(iv);
    try{ navigator.vibrate && navigator.vibrate([0,40,60,20]); }catch(e){}
    const HOLD = variant==='b' ? 2200 : 2400;
    setTimeout(()=>{
      done && done();                 // 로그인창을 먼저 띄워 뒤에 깔고
      iv.classList.add('iv-out');      // 그 위에서 인트로를 걷어냄 (앱 화면 안 비침)
      setTimeout(()=>iv.remove(), 480);
    }, HOLD);
  }

  function showLogin(){
    const ov=document.createElement('div'); ov.id='idfLogin';
    ov.innerHTML=`
      <div class="idf-card">
        <div class="idf-logo">${LOGO_SVG}</div>
        <div class="idf-t">아이디어 폴더</div>
        <div class="idf-s">코드와 PIN으로 로그인</div>
        <input id="idfCode" maxlength="6" placeholder="코드 6자리" autocomplete="off" autocapitalize="characters" spellcheck="false">
        <div class="idf-pins" id="idfPins">
          <input class="idf-pin" maxlength="1" inputmode="numeric" type="password" autocomplete="off">
          <input class="idf-pin" maxlength="1" inputmode="numeric" type="password" autocomplete="off">
          <input class="idf-pin" maxlength="1" inputmode="numeric" type="password" autocomplete="off">
          <input class="idf-pin" maxlength="1" inputmode="numeric" type="password" autocomplete="off">
        </div>
        <div class="idf-err" id="idfErr"></div>
        <button id="idfGo">들어가기</button>
      </div>`;
    document.body.appendChild(ov);
    const code=document.getElementById('idfCode');
    const pins=[...ov.querySelectorAll('.idf-pin')];
    const getPin=()=>pins.map(p=>p.value).join('');

    code.addEventListener('input',()=>{
      code.value=code.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
      if(code.value.length>=6) pins[0].focus();
    });
    pins.forEach((p,i)=>{
      p.addEventListener('input',()=>{
        p.value=p.value.replace(/[^0-9]/g,'');
        if(p.value){ p.classList.add('filled'); pop(p); buzz();
          if(i<3) pins[i+1].focus(); else { p.blur(); setTimeout(go,140); } }
        else p.classList.remove('filled');
      });
      p.addEventListener('keydown',e=>{
        if(e.key==='Backspace' && !p.value && i>0){
          e.preventDefault(); pins[i-1].focus(); pins[i-1].value=''; pins[i-1].classList.remove('filled'); }
        else if(e.key==='Enter') go();
      });
    });

    const go=async()=>{
      const b=document.getElementById('idfGo'); b.disabled=true; b.textContent='확인 중…';
      const r=await tryLogin(code.value, getPin());
      if(r.ok){ ov.classList.add('done'); setTimeout(()=>ov.remove(),260); addLogoutBtn(r.expiresAt);
        try{ await loadCloud(CURRENT); }catch(e){ toast('불러오기 실패 — 새로고침 해주세요'); } }
      else{ document.getElementById('idfErr').textContent=r.msg; b.disabled=false; b.textContent='들어가기';
        const card=ov.querySelector('.idf-card'); card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
        buzz(); pins.forEach(p=>{ p.value=''; p.classList.remove('filled'); }); pins[0].focus(); }
    };
    document.getElementById('idfGo').onclick=go;
    setTimeout(()=>code.focus(),320);
  }

  function addLogoutBtn(expiresAt){
    const brand=document.querySelector('header .brand');
    let b=document.getElementById('idfOut');
    if(!b){ b=document.createElement('button'); b.id='idfOut';
      b.onclick=()=>{ if(confirm('로그아웃할까요?')){ localStorage.removeItem(SESS);
        try{ localStorage.removeItem(KEY); }catch(e){} location.reload(); } };

  document.head.appendChild(st);

  /* ═══════════ 관리자 페이지 ═══════════ */
  let ADMIN_ID=null, ALL_ACC=[];

  function randCode(){ const cs='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
    for(let i=0;i<6;i++) s+=cs[Math.floor(Math.random()*cs.length)]; return s; }
  function randPin(){ return String(Math.floor(1000+Math.random()*9000)); }
  function addMonthsISO(m){ const d=new Date(); d.setMonth(d.getMonth()+m); return d.toISOString(); }
  function fmtDate(iso){ if(!iso) return '평생'; const d=new Date(iso);
    return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate(); }
  function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y);
    g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

  /* 눈에 안 띄는 관리자 진입 문양(항상 우상단, 로그인 화면 위에서도 클릭됨) */
  function ensureAdminDot(){
    if(document.getElementById('idfAdminDot')) return;
    const d=document.createElement('div'); d.id='idfAdminDot'; d.title='관리자';
    d.onclick=openAdmin; document.body.appendChild(d);
  }

  function openAdmin(){
    if(document.getElementById('idfAdmin')) return;
    const ov=document.createElement('div'); ov.id='idfAdmin'; document.body.appendChild(ov);
    adminLoginView(ov);
  }
  function closeAdmin(){ const o=document.getElementById('idfAdmin'); if(o) o.remove(); }

  function adminLoginView(ov){
    ov.innerHTML=`<div class="adm-wrap">
      <button class="adm-x" id="admX">×</button>
      <div class="adm-h">관리자 페이지</div>
      <div class="adm-sub">아이디와 비밀번호</div>
      <input id="admId" placeholder="아이디" autocomplete="off">
      <input id="admPw" type="password" placeholder="비밀번호" autocomplete="off">
      <div class="adm-err" id="admErr"></div>
      <button class="adm-go" id="admGo">들어가기</button></div>`;
    document.getElementById('admX').onclick=closeAdmin;
    const go=async()=>{
      const b=document.getElementById('admGo'); b.disabled=true; b.textContent='확인 중…';
      const ok=await adminVerify(document.getElementById('admId').value, document.getElementById('admPw').value);
      if(ok){ adminPanelView(ov); }
      else{ document.getElementById('admErr').textContent='아이디 또는 비밀번호가 달라요'; b.disabled=false; b.textContent='들어가기'; }
    };
    document.getElementById('admGo').onclick=go;
    document.getElementById('admPw').onkeydown=e=>{ if(e.key==='Enter') go(); };
    document.getElementById('admId').focus();
  }

  async function adminVerify(id,pw){
    id=(id||'').trim().toLowerCase(); pw=(pw||'').trim();
    if(!id||!pw) return false;
    try{
      const {data,error}=await sb.from('idea_folder_users').select('*').eq('code',id).maybeSingle();
      if(error||!data||!data.is_admin) return false;
      let h=''; try{ h=await sha256(pw); }catch(e){}
      if(pw!==data.pin && h!==data.pin) return false;
      ADMIN_ID=id; return true;
    }catch(e){ return false; }
  }

  function adminPanelView(ov){
    ov.innerHTML=`<div class="adm-panel">
      <div class="adm-top"><div class="adm-h">관리자</div><button class="adm-x" id="admX2">×</button></div>

      <div class="adm-card">
        <div class="adm-t2">🔑 비밀번호 변경</div>
        <input id="admNewPw" type="password" placeholder="새 비밀번호">
        <button class="adm-btn" id="admPwSave">변경</button>
      </div>

      <div class="adm-card">
        <div class="adm-t2">➕ 코드 생성</div>
        <input id="admName" placeholder="이름/메모 (선택, 예: 홍길동)">
        <div class="adm-dur" id="admDur">
          <button data-d="6" class="sel">6개월</button>
          <button data-d="12">1년</button>
          <button data-d="0">평생</button>
        </div>
        <button class="adm-btn adm-primary" id="admGen">코드 생성</button>
        <div id="admResult"></div>
      </div>

      <div class="adm-card">
        <div class="adm-t2">📋 발급한 코드</div>
        <input id="admSearch" placeholder="이름·코드 검색">
        <div class="adm-filter" id="admFilter">
          <button data-f="all" class="sel">전체</button>
          <button data-f="active">활성</button>
          <button data-f="expired">만료</button>
        </div>
        <div id="admList" class="adm-list">불러오는 중…</div>
      </div>
    </div>`;
    document.getElementById('admX2').onclick=closeAdmin;

    document.getElementById('admPwSave').onclick=async()=>{
      const v=document.getElementById('admNewPw').value.trim();
      if(v.length<2){ toast('새 비밀번호를 입력하세요'); return; }
      const {error}=await sb.from('idea_folder_users').update({pin:v}).eq('code',ADMIN_ID);
      if(error){ toast('변경 실패'); return; }
      document.getElementById('admNewPw').value=''; toast('비밀번호 변경됨 ✓');
    };

    let DUR=6;
    document.querySelectorAll('#admDur button').forEach(b=>b.onclick=()=>{
      DUR=+b.dataset.d;
      document.querySelectorAll('#admDur button').forEach(x=>x.classList.toggle('sel',x===b));
    });

    document.getElementById('admGen').onclick=async()=>{
      const name=document.getElementById('admName').value.trim();
      const btn=document.getElementById('admGen'); btn.disabled=true; btn.textContent='생성 중…';
      const acc=await createCode(name,DUR);
      btn.disabled=false; btn.textContent='코드 생성';
      if(acc){ const r=document.getElementById('admResult'); r.innerHTML=''; r.appendChild(codeCard(acc));
        document.getElementById('admName').value=''; refreshList(); }
    };

    document.getElementById('admSearch').oninput=refreshList;
    document.querySelectorAll('#admFilter button').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('#admFilter button').forEach(x=>x.classList.toggle('sel',x===b));
      refreshList();
    });
    refreshList();
  }

  async function createCode(name, durMonths){
    for(let i=0;i<6;i++){
      const code=randCode(), pin=randPin();
      const expires_at = durMonths>0 ? addMonthsISO(durMonths) : null;
      const {error}=await sb.from('idea_folder_users')
        .insert({code, pin, name:name||null, expires_at, is_admin:false});
      if(!error) return {code,pin,expires_at,name};
    }
    toast('코드 생성 실패 — 다시 시도'); return null;
  }

  function codeCard(acc){
    const exp = acc.expires_at ? ('만료 '+fmtDate(acc.expires_at)) : '평생 이용';
    const wrap=document.createElement('div'); wrap.className='cc-wrap';
    wrap.innerHTML=`
      <div class="cc">
        <div class="cc-brand">아이디어 폴더</div>
        <div class="cc-label">로그인 코드</div>
        <div class="cc-code">${acc.code}</div>
        <div class="cc-row"><span>PIN</span><b>${acc.pin}</b></div>
        <div class="cc-row"><span>기간</span><b class="cc-exp">${exp}</b></div>
        ${acc.name?`<div class="cc-name">${esc(acc.name)}</div>`:''}
      </div>
      <div class="cc-actions">
        <button class="adm-btn" data-cc="copy">텍스트 복사</button>
        <button class="adm-btn adm-primary" data-cc="img">📸 이미지 저장</button>
      </div>`;
    wrap.querySelector('[data-cc="copy"]').onclick=()=>{
      const t=`[아이디어 폴더 로그인]\n코드: ${acc.code}\nPIN: ${acc.pin}\n기간: ${exp}`;
      if(navigator.clipboard) navigator.clipboard.writeText(t);
      toast('복사됨 ✓ — 카톡에 붙여넣기');
    };
    wrap.querySelector('[data-cc="img"]').onclick=()=>saveCardImage(acc);
    return wrap;
  }

  function saveCardImage(acc){
    const W=720,H=940, c=document.createElement('canvas'); c.width=W; c.height=H;
    const g=c.getContext('2d'); const F="'Malgun Gothic','Apple SD Gothic Neo',sans-serif";
    g.fillStyle='#0D0D0D'; g.fillRect(0,0,W,H);
    g.fillStyle='rgba(200,255,0,.06)'; roundRect(g,40,40,W-80,H-80,36); g.fill();
    g.strokeStyle='rgba(200,255,0,.55)'; g.lineWidth=3; roundRect(g,40,40,W-80,H-80,36); g.stroke();
    g.textAlign='center';
    g.fillStyle='#C8FF00'; g.font='700 36px '+F; g.fillText('아이디어 폴더', W/2, 150);
    g.fillStyle='#8a8a86'; g.font='500 22px '+F; g.fillText('로그인 코드', W/2, 290);
    g.fillStyle='#f2f2f0'; g.font='800 104px '+F; g.fillText(acc.code, W/2, 400);
    g.fillStyle='#8a8a86'; g.font='500 24px '+F; g.textAlign='right'; g.fillText('PIN', W/2-24, 510);
    g.fillStyle='#f2f2f0'; g.font='800 46px '+F; g.textAlign='left';  g.fillText(acc.pin, W/2+24, 514);
    const exp = acc.expires_at ? ('만료 '+fmtDate(acc.expires_at)) : '평생 이용';
    g.fillStyle='#8a8a86'; g.font='500 24px '+F; g.textAlign='right'; g.fillText('기간', W/2-24, 590);
    g.fillStyle='#C8FF00'; g.font='700 30px '+F; g.textAlign='left';  g.fillText(exp, W/2+24, 592);
    if(acc.name){ g.fillStyle='#5a5a56'; g.font='500 24px '+F; g.textAlign='center'; g.fillText(acc.name, W/2, 680); }
    g.fillStyle='#5a5a56'; g.font='500 20px '+F; g.textAlign='center';
    g.fillText('앱에서 이 코드와 PIN으로 로그인하세요', W/2, H-100);
    c.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b);
      a.download='아이디어폴더_코드_'+acc.code+'.png'; a.click();
      toast('이미지 저장됨 ✓'); },'image/png');
  }

  async function refreshList(){
    const {data}=await sb.from('idea_folder_users').select('*')
      .eq('is_admin',false).order('created_at',{ascending:false});
    ALL_ACC=data||[];
    const el=document.getElementById('admList'); if(!el) return;
    const q=(document.getElementById('admSearch')?.value||'').trim().toLowerCase();
    const f=document.querySelector('#admFilter button.sel')?.dataset.f||'all';
    const now=Date.now();
    const list=ALL_ACC.filter(a=>{
      const expired=a.expires_at && Date.parse(a.expires_at)<now;
      if(f==='active' && expired) return false;
      if(f==='expired' && !expired) return false;
      if(q) return (a.code||'').toLowerCase().includes(q) || (a.name||'').toLowerCase().includes(q);
      return true;
    });
    if(!list.length){ el.innerHTML='<div class="adm-empty">없음</div>'; return; }
    el.innerHTML=list.map(a=>{
      const life=!a.expires_at, exp=life?null:Date.parse(a.expires_at);
      const expired= exp!==null && exp<now;
      const dl= exp!==null? Math.ceil((exp-now)/86400000):null;
      const st = life?'<span class="st life">평생</span>'
        : expired?'<span class="st exp">만료</span>':('<span class="st ok">D-'+dl+'</span>');
      return `<div class="adm-row" data-code="${a.code}">
        <div class="ar-main"><div class="ar-top"><b>${a.code}</b> ${st}</div>
          <div class="ar-sub">${esc(a.name||'-')} · ${life?'평생':('만료 '+fmtDate(a.expires_at))} · PIN ${a.pin}</div></div>
        <div class="ar-acts">
          <button data-act="ext6">+6개월</button>
          <button data-act="ext12">+1년</button>
          <button data-act="pin">PIN</button>
          <button data-act="del" class="danger">삭제</button>
        </div></div>`;
    }).join('');
    el.querySelectorAll('.adm-row').forEach(row=>{
      const code=row.dataset.code;
      row.querySelectorAll('[data-act]').forEach(btn=>btn.onclick=async()=>{
        const act=btn.dataset.act;
        if(act==='ext6') await extendCode(code,6);
        else if(act==='ext12') await extendCode(code,12);
        else if(act==='pin'){ const np=(prompt('새 PIN (숫자 4자리)')||'').trim();
          if(np){ await sb.from('idea_folder_users').update({pin:np}).eq('code',code); toast('PIN 변경됨 ✓'); } }
        else if(act==='del'){ if(confirm(code+' 계정을 삭제할까요?')){
          await sb.from('idea_folder_users').delete().eq('code',code); toast('삭제됨'); } }
        refreshList();
      });
    });
  }

  async function extendCode(code, months){
    const a=ALL_ACC.find(x=>x.code===code); if(!a) return;
    if(!a.expires_at){ toast('이미 평생 계정이에요'); return; }
    const base=(Date.parse(a.expires_at)>Date.now())?new Date(a.expires_at):new Date();
    base.setMonth(base.getMonth()+months);
    await sb.from('idea_folder_users').update({expires_at:base.toISOString()}).eq('code',code);
    toast('+'+(months===12?'1년':months+'개월')+' 연장 ✓');
  }

  /* ---- 관리자 스타일 ---- */
  const st2=document.createElement('style');
  st2.textContent=`
    #idfAdminDot{position:fixed;top:calc(9px + env(safe-area-inset-top));right:11px;z-index:10000;
      width:14px;height:14px;border-radius:50%;background:rgba(200,255,0,.14);cursor:pointer;
      transition:background .2s,transform .2s}
    #idfAdminDot:hover{background:rgba(200,255,0,.55);transform:scale(1.1)}
    #idfAdmin{position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);display:flex;justify-content:center;overflow-y:auto;padding:0}
    #idfAdmin .adm-wrap{width:100%;max-width:340px;margin:auto;text-align:center;padding:24px;position:relative}
    #idfAdmin .adm-panel{width:100%;max-width:460px;padding:calc(20px + env(safe-area-inset-top)) 16px 60px}
    #idfAdmin .adm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    #idfAdmin .adm-h{font-size:20px;font-weight:800;color:#f2f2f0}
    #idfAdmin .adm-sub{font-size:13px;color:#8a8a86;margin:6px 0 18px}
    #idfAdmin .adm-x{background:none;border:none;color:#8a8a86;font-size:26px;cursor:pointer;line-height:1;padding:4px 8px}
    #idfAdmin input{width:100%;background:#151515;border:1px solid #2a2a2a;border-radius:11px;
      color:#f2f2f0;font-size:15px;padding:12px 14px;margin-bottom:10px;outline:none;font-family:inherit}
    #idfAdmin input:focus{border-color:rgba(200,255,0,.5)}
    #idfAdmin .adm-err{color:#ff6b6b;font-size:13px;min-height:18px;margin-bottom:4px}
    #idfAdmin .adm-go{width:100%;background:#C8FF00;color:#0D0D0D;border:none;border-radius:11px;
      font-size:15px;font-weight:800;padding:14px;cursor:pointer;font-family:inherit}
    #idfAdmin .adm-card{background:#151515;border:1px solid #232323;border-radius:16px;padding:16px;margin-bottom:14px;text-align:left}
    #idfAdmin .adm-t2{font-size:14px;font-weight:800;color:#f2f2f0;margin-bottom:12px}
    #idfAdmin .adm-btn{background:#1c1c1c;border:1px solid #333;color:#f2f2f0;border-radius:10px;
      padding:11px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
    #idfAdmin .adm-primary{background:#C8FF00;color:#0D0D0D;border-color:#C8FF00}
    #idfAdmin .adm-dur{display:flex;gap:8px;margin-bottom:12px}
    #idfAdmin .adm-dur button{flex:1;background:#1c1c1c;border:1px solid #333;color:#8a8a86;
      border-radius:10px;padding:11px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    #idfAdmin .adm-dur button.sel{background:rgba(200,255,0,.14);border-color:#C8FF00;color:#C8FF00}
    #idfAdmin .adm-filter{display:flex;gap:7px;margin-bottom:12px}
    #idfAdmin .adm-filter button{background:#1c1c1c;border:1px solid #333;color:#8a8a86;border-radius:20px;
      padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    #idfAdmin .adm-filter button.sel{background:rgba(200,255,0,.14);border-color:#C8FF00;color:#C8FF00}
    #idfAdmin .cc-wrap{margin-top:14px}
    #idfAdmin .cc{background:linear-gradient(160deg,#161a0a,#0D0D0D);border:1px solid rgba(200,255,0,.4);
      border-radius:18px;padding:22px;text-align:center;box-shadow:0 0 30px rgba(200,255,0,.12)}
    #idfAdmin .cc-brand{color:#C8FF00;font-weight:800;font-size:15px;letter-spacing:-.01em}
    #idfAdmin .cc-label{color:#8a8a86;font-size:12px;margin:14px 0 4px}
    #idfAdmin .cc-code{color:#f2f2f0;font-size:44px;font-weight:800;letter-spacing:.08em;margin-bottom:12px}
    #idfAdmin .cc-row{display:flex;justify-content:space-between;color:#8a8a86;font-size:14px;padding:5px 4px;border-top:1px solid #232323}
    #idfAdmin .cc-row b{color:#f2f2f0}
    #idfAdmin .cc-row b.cc-exp{color:#C8FF00}
    #idfAdmin .cc-name{color:#5a5a56;font-size:13px;margin-top:10px}
    #idfAdmin .cc-actions{display:flex;gap:8px;margin-top:12px}
    #idfAdmin .cc-actions .adm-btn{width:auto;flex:1}
    #idfAdmin .adm-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
    #idfAdmin .adm-empty{color:#5a5a56;font-size:13px;text-align:center;padding:14px}
    #idfAdmin .adm-row{background:#1a1a1a;border:1px solid #262626;border-radius:12px;padding:11px 12px}
    #idfAdmin .ar-top{font-size:15px;color:#f2f2f0}
    #idfAdmin .ar-top b{letter-spacing:.05em}
    #idfAdmin .ar-sub{font-size:12px;color:#8a8a86;margin-top:3px}
    #idfAdmin .st{font-size:11px;font-weight:800;border-radius:8px;padding:2px 7px;margin-left:6px}
    #idfAdmin .st.ok{color:#C8FF00;background:rgba(200,255,0,.12)}
    #idfAdmin .st.life{color:#7ab8ff;background:rgba(122,184,255,.12)}
    #idfAdmin .st.exp{color:#ff6b6b;background:rgba(255,107,107,.12)}
    #idfAdmin .ar-acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    #idfAdmin .ar-acts button{flex:1;min-width:64px;background:#232323;border:1px solid #333;color:#c8c8c4;
      border-radius:8px;padding:8px 4px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
    #idfAdmin .ar-acts button.danger{color:#ff8a8a;border-color:#3a2626}`;
  document.head.appendChild(st2);

  /* ---- 부팅: 관리자 문양 항상 표시 + 세션 자동로그인/로그인화면 ---- */
  ensureAdminDot();
  async function verifyAndLoad(code){
    try{
      const {data,error}=await sb.from('idea_folder_users').select('*').eq('code',code).maybeSingle();
      if(error) throw error;
      if(!data || (data.expires_at && Date.parse(data.expires_at)<Date.now())){
        localStorage.removeItem(SESS); try{ localStorage.removeItem(KEY); }catch(e){}
        CURRENT=null; showLogin(); return;
      }
      addLogoutBtn(data.expires_at||null);
      await loadCloud(code);
    }catch(e){ addLogoutBtn(); toast('오프라인 — 저장된 내용 표시'); }
  }
  const saved=localStorage.getItem(SESS);
  playIntro(INTRO_VARIANT, ()=>{
    if(saved){ CURRENT=saved; verifyAndLoad(saved); }
    else{ showLogin(); }
  });
})();
</script>
